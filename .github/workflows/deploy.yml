name: Deploy to Cloudflare Pages

on:
  push:
    branches: [website]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install mise
        uses: jdx/mise-action@v2
      - name: Config mise
        run: mise settings experimental=true
      - name: Install dependencies
        run: mise install
      - name: Build
        run: mise run build
      - name: Deploy to Cloudflare Pages
        # Call wrangler directly rather than via cloudflare/wrangler-action.
        # The action runs `npm i wrangler` inside the repo, which triggers npm's
        # full-tree resolution and fails on the project's nub-only peer deps.
        # `npx --yes` fetches wrangler into an isolated cache and runs it, never
        # touching the project tree. wrangler reads the token/account from env.
        run: npx --yes wrangler@4 pages deploy dist --project-name nehir-website --branch main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
