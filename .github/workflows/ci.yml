name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Swift tests
    runs-on: macos-26
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up mise
        uses: jdx/mise-action@v4

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version
          mise --version

      - name: Check changeset coverage
        run: mise run changeset:check

      - name: Run tests
        run: mise run test
