name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Swift tests
    runs-on: macos-26

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version

      - name: Run tests
        run: swift test
