name: Release

on:
  workflow_dispatch:
    inputs:
      prerelease:
        description: "Create a GitHub prerelease and skip Homebrew tap publishing"
        type: boolean
        default: false
      prerelease_suffix:
        description: "Optional tag/asset suffix, e.g. rc.1 or beta.1"
        type: string
        required: false

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Build release and update Homebrew tap
    runs-on: macos-26
    timeout-minutes: 45

    env:
      TAP_REPOSITORY: Guria/homebrew-tap
      CASK_PATH: Casks/nehir.rb

    steps:
      - name: Check out Nehir main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up mise
        uses: jdx/mise-action@v2

      - name: Plan release from changesets
        id: version
        env:
          PRERELEASE_SUFFIX: ${{ inputs.prerelease_suffix }}
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ inputs.prerelease }}" = "true" ] && [ -z "${PRERELEASE_SUFFIX}" ]; then
            echo "prerelease_suffix is required when prerelease=true, for example rc.1 or beta.1" >&2
            exit 1
          fi
          if [ "${{ inputs.prerelease }}" != "true" ] && [ -n "${PRERELEASE_SUFFIX}" ]; then
            echo "prerelease_suffix requires prerelease=true" >&2
            exit 1
          fi
          mise run release:plan

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version
          mise --version

      - name: Apply release plan
        shell: bash
        run: mise run release:apply -- "${{ steps.version.outputs.version }}"

      - name: Commit release prep
        if: ${{ !inputs.prerelease }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Info.plist "${{ steps.version.outputs.notes }}"
          if git diff --cached --quiet; then
            echo "Release prep already committed."
          else
            git commit -m "Prepare release ${{ steps.version.outputs.version }}"
            git push origin main
          fi

      - name: Create release tag
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.version.outputs.tag }}"
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag already exists: $TAG" >&2
            exit 1
          fi
          git tag "$TAG"
          git push origin "$TAG"

      - name: Build unsigned release ZIP
        env:
          RELEASE_ZIP_PATH: ${{ github.workspace }}/${{ steps.version.outputs.zip }}
        run: mise run package:release -- false

      - name: Compute SHA-256
        id: checksum
        shell: bash
        run: |
          set -euo pipefail
          SHA256="$(shasum -a 256 "${{ steps.version.outputs.zip }}" | awk '{print $1}')"
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"
          echo "$SHA256  ${{ steps.version.outputs.zip }}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          ZIP: ${{ steps.version.outputs.zip }}
          NOTES_FILE: ${{ steps.version.outputs.notes }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release already exists: $TAG" >&2
            exit 1
          fi
          args=(
            "$TAG"
            "$ZIP"
            --target "$(git rev-parse HEAD)"
            --title "Nehir ${TAG#v}"
            --notes-file "$NOTES_FILE"
          )
          if [ "${{ inputs.prerelease }}" = "true" ]; then
            args+=(--prerelease)
          fi
          gh release create "${args[@]}"

      - name: Create Homebrew tap token
        if: ${{ !inputs.prerelease }}
        id: tap-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.TAP_APP_ID }}
          private-key: ${{ secrets.TAP_APP_PRIVATE_KEY }}
          owner: Guria
          repositories: homebrew-tap

      - name: Check out Homebrew tap
        if: ${{ !inputs.prerelease }}
        uses: actions/checkout@v4
        with:
          repository: ${{ env.TAP_REPOSITORY }}
          token: ${{ steps.tap-token.outputs.token }}
          path: homebrew-tap

      - name: Update cask version and checksum
        if: ${{ !inputs.prerelease }}
        env:
          VERSION: ${{ steps.version.outputs.version }}
          SHA256: ${{ steps.checksum.outputs.sha256 }}
          CASK_FILE: homebrew-tap/${{ env.CASK_PATH }}
        shell: bash
        run: |
          ruby <<'RUBY'
          path = ENV.fetch("CASK_FILE")
          version = ENV.fetch("VERSION")
          sha256 = ENV.fetch("SHA256")

          text = File.read(path)
          text = text.sub(/version "[^"]+"/, %(version "#{version}"))
          text = text.sub(/^  sha256 (?:"[0-9a-f]{64}"|:no_check(?:.*)?)$/, %(  sha256 "#{sha256}"))
          File.write(path, text)
          RUBY

      - name: Validate cask syntax and style
        if: ${{ !inputs.prerelease }}
        working-directory: homebrew-tap
        run: |
          ruby -c Casks/nehir.rb
          brew style Casks/nehir.rb

      - name: Commit and push tap update
        if: ${{ !inputs.prerelease }}
        working-directory: homebrew-tap
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "Cask already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${{ env.CASK_PATH }}"
          git commit -m "Update Nehir to ${{ steps.version.outputs.version }}"
          git push

      - name: Clear released changesets
        if: ${{ !inputs.prerelease }}
        shell: bash
        run: |
          set -euo pipefail
          git checkout main
          git pull --ff-only origin main

          find .changeset -maxdepth 1 -type f -name '*.md' ! -iname 'README.md' -delete

          if git diff --quiet -- .changeset; then
            echo "No released changesets to clear."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -u .changeset
          git commit -m "Clear changesets after ${{ steps.version.outputs.tag }}"
          git push origin main
