[tasks."dev"]
description = "Build and run Nehir (--trace starts runtime trace capture at bootstrap)"
depends = ["build"]
run = "bash .config/mise/scripts/nehir-dev-run dev"

[tasks."dev:release"]
description = "Build and run Nehir (release; --trace starts runtime trace capture at bootstrap)"
depends = ["build:release"]
run = "bash .config/mise/scripts/nehir-dev-run release"

[tasks."dev:clean"]
description = "Kill any running Nehir instance, clear runtime state, then start Nehir (--trace starts runtime trace capture at bootstrap)"
depends = ["build"]
run = "bash .config/mise/scripts/nehir-dev-run clean"

[tasks."dev:onboarding"]
description = "Kill any running Nehir instance, clear onboarding state, then start Nehir to trigger the setup wizard (--trace starts runtime trace capture at bootstrap)"
depends = ["build"]
run = "bash .config/mise/scripts/nehir-dev-run onboarding"
[tasks."trace:clean"]
description = "Remove Nehir trace captures"
run = '''
set -euo pipefail
state_home="${XDG_STATE_HOME:-$HOME/.local/state}"
rm -rf "$state_home/nehir/traces"
'''

[tasks."debug"]
description = "Run Nehir with layout tracing, capturing into a fresh timestamped log file"
depends = ["build"]
run = """
set -e
log_dir="${NEHIR_BUILD_DIR:-.build}/logs"
mkdir -p "$log_dir"
log_file="$log_dir/nehir-trace-$(date +%Y%m%d-%H%M%S).log"
: > "$log_file"
echo "Layout trace -> $log_file"
# /usr/bin/log avoids any shell builtin/function named `log` shadowing it.
/usr/bin/log stream \\
  --predicate 'subsystem == "com.nehir" && category == "layout-trace"' \\
  --info > "$log_file" 2>&1 &
stream_pid=$!
trap 'kill "$stream_pid" 2>/dev/null' EXIT INT TERM
# Give the stream a moment to start filtering before the app emits events.
sleep 0.5
NEHIR_LAYOUT_TRACE=1 swift run Nehir
"""

[tasks."downloads"]
description = "Show GitHub Release download counts for Nehir release zips"
quiet = true
run = '''
set -euo pipefail

repo="guria/nehir"
asset_pattern='^Nehir-.*\\.zip$'

gh api "repos/$repo/releases" --paginate \
  --jq '.[] as $release
    | $release.assets[]
    | select(.name | test("'"$asset_pattern"'"))
    | [$release.tag_name, .download_count]
    | @tsv' \
  | awk '
      { rows[++n] = $0; total += $2 }
      END {
        print "total\t" total
        print "tag\tdownloads"
        for (i = 1; i <= n; i++) print rows[i]
      }'
'''
